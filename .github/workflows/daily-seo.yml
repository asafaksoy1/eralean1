name: Daily SEO Article

on:
  schedule:
    # 5 AM UTC every day
    - cron: "0 5 * * *"
  # Allows manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  generate:
    name: Generate and open PR
    runs-on: ubuntu-latest

    permissions:
      contents: write      # push the new branch
      pull-requests: write # open the PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate article
        id: generate
        run: node scripts/daily-seo.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # peter-evans/create-pull-request detects the changed files (new .tsx,
      # updated routes.ts / react-router.config.ts / sitemap.xml /
      # published-topics.json), commits them to a new branch, and opens a PR.
      # It does nothing if there are no changed files (e.g. if the script
      # somehow produced no diff, which shouldn't happen in practice).
      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "content: add /learn/${{ steps.generate.outputs.article_slug }}"
          branch: "seo/${{ steps.generate.outputs.article_slug }}"
          # Don't overwrite an existing branch if a previous PR for this
          # slug is still open — fail loudly instead.
          branch-suffix: timestamp
          delete-branch: true
          title: "[SEO] ${{ steps.generate.outputs.article_title }}"
          labels: needs-review
          draft: false
          body: |
            ## ⚠️ AI-generated content — not yet reviewed

            This pull request was opened automatically by the **daily SEO pipeline**.
            The content is AI-generated and has **not been reviewed by a human**.

            **Article:** [`/learn/${{ steps.generate.outputs.article_slug }}`](https://www.eralean.com/learn/${{ steps.generate.outputs.article_slug }})

            ---

            ### Review checklist

            - [ ] Read the full article — does it make sense and read naturally?
            - [ ] UK spelling throughout (optimise, colour, centre, realise…)
            - [ ] Factual claims look accurate and are grounded in real data
            - [ ] No filler phrases ("In today's landscape", "It's important to note", etc.)
            - [ ] Tone matches existing articles — direct, evidence-led, no hype
            - [ ] TypeScript build passed ✅ (checked automatically in CI before this PR was opened)
            - [ ] Routes and sitemap look correct in the diff
            - [ ] `scripts/published-topics.json` includes the new entry

            ---

            **Do not merge without completing the checklist above.**

            Generated by `scripts/daily-seo.js` using `claude-opus-4-8`.
